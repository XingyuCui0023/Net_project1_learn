name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore FinanceTracker.sln
      - run: dotnet build FinanceTracker.sln --configuration Release --no-restore
      - run: dotnet test FinanceTracker.sln --configuration Release --no-build
